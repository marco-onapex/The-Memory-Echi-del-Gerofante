<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Memory: Echi del Gerofante - Archivio perduto del forum GDR di The Miracle Shard (2001-2019)" />
  <meta name="theme-color" content="#D4AF37" />
  
  <title>The Memory: Echi del Gerofante</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="./src/css/style.css" />

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-ornament">𝔍 ✦ 𝔍</div>
  <h1>The Memory: Echi del Gerofante</h1>
  <p class="subtitle">Archivio perduto del forum GDR di The Miracle Shard (2001-2019)</p>
  <div class="header-line"></div>
</header>

<!-- MAIN -->
<div class="container visible" id="container">
  <div class="main-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <h3 class="sidebar-title">📚 Archivi</h3>
          <ul class="sidebar-list" id="archives-list">
            <li><a href="#" onclick="window.filterByYear('all');" class="sidebar-link active">Tutti i periodi</a></li>
          </ul>
        </div>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- Filters -->
      <div class="filters-bar">
        <premium-input 
          id="f-keyword"
          label="🔍 Ricerca parola chiave"
          placeholder="Cerca nel titolo o nel testo..."
          icon="🔎"
        ></premium-input>
        
        <premium-input 
          id="f-author"
          label="✍ Autore"
          placeholder="Nome utente..."
          icon="👤"
        ></premium-input>
        
        <premium-date-input 
          id="f-date-from"
          label="📅 Dal"
          icon="📅"
        ></premium-date-input>
        
        <premium-date-input 
          id="f-date-to"
          label="📅 Al"
          icon="📅"
        ></premium-date-input>
        
        <premium-button variant="primary" size="md" onclick="window.search()">
          🔍 Cerca
        </premium-button>
      </div>

  <!-- Stats -->
  <div class="stats-bar">
    <span id="stats-txt"></span>
  </div>

  <!-- Error Box -->
  <div id="error-box" class="error" style="display:none;"></div>

    <!-- Thread List -->
  <div id="thread-list" class="thread-list">
    <div class="empty">Caricamento...</div>
  </div>

  <!-- Pagination -->
  <div id="pagination" class="pagination"></div>
    </main>
  </div>
</div>
<!-- Thread Detail Page -->
<div id="detail-page" class="detail-page hidden">
  <header class="detail-header-page">
    <button class="btn-back" onclick="window.router.back()" title="Torna alla lista">← Indietro</button>
    <h2 class="detail-title-page" id="detail-title-page"></h2>
  </header>
  
  <!-- Breadcrumb -->
  <div class="detail-breadcrumb">
    <a href="#" onclick="window.router.back();">📚 Forum</a>
    <span class="breadcrumb-sep">›</span>
    <span class="breadcrumb-current" id="breadcrumb-current"></span>
  </div>
  
  <div class="detail-container">
    <div class="detail-meta-page" id="detail-meta-page"></div>
    <div class="detail-posts-page" id="detail-posts-page"></div>
  </div>
</div>

<!-- Main App Script -->
<script type="module">
  import { initApp, setupEventListeners } from './src/js/app.js';
  import { router } from './src/js/router.js';
  import { loadConfig } from './src/config-loader.js';

  (async () => {
    try {
      // Carica la configurazione
      const config = await loadConfig();
      
      // Esponi router globalmente PRIMA di initApp
      window.router = router;
      
      // Inizializza app
      await initApp(config.supabase);
      
      // Setup event listeners
      setupEventListeners();
      
      // Ripristina la view da URL (se user accede direttamente con ?thread=...)
      router.restoreFromUrl();
      
      // Gestisci il back button del browser
      window.addEventListener('popstate', () => {
        router.handlePopState();
      });
      
      console.log("🎭 L'Orecchio del Gerofante - versione 1.0.0");
    } catch (err) {
      console.error('Errore inizializzazione app:', err);
      const errorBox = document.getElementById('error-box');
      if (errorBox) {
        errorBox.textContent = "❌ Errore: " + err.message;
        errorBox.style.display = 'block';
      }
    }
  })();
</script>

</body>
</html>
