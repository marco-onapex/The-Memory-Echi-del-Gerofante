<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Memory: Echi del Gerofante - Archivio perduto del forum GDR" />
  <meta name="theme-color" content="#D4AF37" />
  
  <title>Archivio GDR - The Memory</title>

  <!-- Fonts - Miracle Gaming Zone: Montserrat + Raleway -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Raleway:wght@700&display=swap" rel="stylesheet" />

  <!-- Base Styles -->
  <link rel="stylesheet" href="./src/css/style.css" />
  
  <!-- Miracle Gaming Zone Theme Override -->
  <link rel="stylesheet" href="./src/css/style-iframe-mgz.css" />
  
  <!-- iFrame-specific layout styles -->
  <style>
    /* Ottimizzazione per iframe */
    body {
      margin: 0;
      padding: 0;
      background: var(--stone-bg);
    }

    /* Nascondi header */
    header {
      display: none;
    }

    /* Sidebar compatto per iframe */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      margin-left: 0;
    }

    .sidebar {
      display: none;
    }

    .main-content {
      width: 100%;
      flex: 1;
      padding: 0;
    }

    /* Sidebar toggle removed - archives no longer used */

    /* Riduci container */
    .container {
      padding: 0;
      max-width: 100%;
    }

    /* Info panel - uso gli stili dalla versione completa */

    /* Thread list - uso gli stili dalla versione completa */

    /* Pagination - uso gli stili dalla versione completa */
  </style>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- MAIN -->
<div class="container visible" id="container">
  <div class="main-layout">
<!-- SIDEBAR REMOVED - Archives no longer used -->

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <!-- LIST VIEW (Thread search & results) -->
      <div id="list-view" class="view-panel visible">
        <!-- Filters -->
        <div class="filters-bar">
          <div class="filter-group" style="flex:1 1 auto;">
            <label class="filter-label">🔍 Ricerca</label>
            <input 
              id="f-keyword" 
              type="text" 
              placeholder="Parola chiave..."
              class="form-input premium-input"
            />
          </div>
          
          <div class="filter-group">
            <label class="filter-label">✍ Autore</label>
            <input 
              id="f-author" 
              type="text" 
              placeholder="Autore..."
              class="form-input premium-input"
            />
          </div>
          
          <div class="filter-group">
            <label class="filter-label">📅 Dal</label>
            <input 
              id="f-date-from" 
              type="date"
              class="form-input premium-input premium-date"
            />
          </div>
          
          <div class="filter-group">
            <label class="filter-label">📅 Al</label>
            <input 
              id="f-date-to" 
              type="date"
              class="form-input premium-input premium-date"
            />
          </div>
          
          <button class="btn-search btn-premium" onclick="window.search()">
            🔍 Cerca
          </button>
        </div>

        <!-- UNIFIED INFO PANEL -->
        <div class="info-panel">
          <!-- Stats -->
          <div class="stats-bar">
            <span id="stats-txt"></span>
            <div id="pagination-top" class="pagination"></div>
          </div>

          <!-- Error Box -->
          <div id="error-box" class="error-message" style="display:none;"></div>

          <!-- Thread List -->
          <div id="thread-list" class="thread-list">
            <div class="empty">Caricamento...</div>
          </div>

          <!-- Pagination -->
          <div id="pagination" class="pagination"></div>
        </div>
      </div>

      <!-- DETAIL VIEW (Thread detail panel) -->
      <div id="detail-view" class="view-panel hidden">
        <!-- Back button & Title -->
        <div class="detail-header">
          <button class="btn-back" onclick="window.router.back()" title="Torna alla lista">← Indietro</button>
          <h2 class="detail-title" id="detail-title"></h2>
        </div>

        <!-- Thread metadata -->
        <div id="detail-meta"></div>
        
        <!-- Posts -->
        <div id="detail-posts" class="detail-posts"></div>
      </div>
    </main>
  </div>
</div>

<!-- Main App Script -->
<script type="module">
  import { initApp, setupEventListeners } from './src/js/app.js';
  import { router } from './src/js/router.js';
  import { loadConfig } from './src/config-loader.js';

  (async () => {
    try {
      // Carica la configurazione
      const config = await loadConfig();
      
      // Esponi router globalmente PRIMA di initApp
      window.router = router;
      
      // Inizializza app
      await initApp(config.supabase);
      
      // Setup event listeners
      setupEventListeners(config.supabase);

      // Auto-resize iframe quando il contenuto cambia
      const resizeIframe = () => {
        if (window.parent !== window) {
          const height = document.documentElement.scrollHeight + 20;
          window.parent.postMessage({ type: 'resize', height }, '*');
        }
      };

      // Observer per rilevare cambiamenti nel DOM
      const observer = new MutationObserver(resizeIframe);
      observer.observe(document.body, { 
        childList: true, 
        subtree: true, 
        characterData: false 
      });

      // Resize iniziale
      setTimeout(resizeIframe, 100);

      // Resize a intervalli per sicurezza
      setInterval(resizeIframe, 500);

    } catch (err) {
      console.error('Init error:', err);
      const el = document.getElementById('error-box');
      if (el) {
        el.textContent = 'Errore durante l\'inizializzazione: ' + err.message;
        el.style.display = 'block';
      }
    }
  })();

  // Globalizza funzioni necessarie
  window.search = async (params = {}, updateUrl = true) => {
    const { searchThreads } = await import('./src/js/search.js');
    searchThreads(window.supabaseClient, {
      keyword: document.getElementById('f-keyword')?.value.trim() || '',
      author: document.getElementById('f-author')?.value.trim() || '',
      dateFrom: document.getElementById('f-date-from')?.value || '',
      dateTo: document.getElementById('f-date-to')?.value || '',
      page: params.page || 1,
      ...params
    });
  };
</script>

</body>
</html>
